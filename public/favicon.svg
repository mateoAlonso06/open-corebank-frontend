<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Blue rounded background -->
  <rect width="32" height="32" rx="7" ry="7" fill="#1d4ed8"/>
  <!-- Landmark icon (lucide), scaled & centered (6px padding, ~20x20 icon area) -->
  <g stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- bottom horizontal line -->
    <line x1="8.5" y1="24.3" x2="23.5" y2="24.3"/>
    <!-- four columns -->
    <line x1="11"  y1="21"   x2="11"  y2="15.2"/>
    <line x1="14.3" y1="21"  x2="14.3" y2="15.2"/>
    <line x1="17.7" y1="21"  x2="17.7" y2="15.2"/>
    <line x1="21"  y1="21"   x2="21"  y2="15.2"/>
    <!-- roof triangle -->
    <polygon points="16,7.7 22.7,11.8 9.3,11.8"/>
  </g>
</svg>
